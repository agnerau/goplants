<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Plant 🌱</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .plant-image {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 15px;
            background: #ddd;
        }

        .plant-name {
            font-size: 24px;
            font-weight: bold;
        }

        .plant-nickname {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }

        .info {
            margin: 8px 0;
            font-size: 14px;
        }

        .label {
            font-weight: bold;
        }

        .back {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #2c7be5;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 20px;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <a href="/" class="back">← Back</a>
    <div id="plant"></div>
</div>

<script>
    function getPlantId() {
        const parts = window.location.pathname.split('/');
        return parts[parts.length - 1];
    }

    const plantId = getPlantId();

    if (!plantId) {
        document.getElementById('plant').innerHTML =
            '<p class="empty">No plant ID provided 😢</p>';
    } else {
        fetch(`/api/plants/${plantId}`)
            .then(res => {
                if (!res.ok) throw new Error("Plant not found");
                return res.json();
            })
            .then(plant => {
                const container = document.getElementById('plant');

                const card = document.createElement('div');
                card.className = 'card';

                const image = document.createElement('img');
                image.className = 'plant-image';
                image.src = 'https://i.pinimg.com/736x/ed/4b/c6/ed4bc632495505f318ae7b39bd815fe3.jpg';

                const name = document.createElement('div');
                name.className = 'plant-name';
                name.textContent = plant.name;

                const nickname = document.createElement('div');
                nickname.className = 'plant-nickname';
                nickname.textContent = plant.nickname || '';

                const bought = document.createElement('div');
                bought.className = 'info';
                bought.innerHTML = `<span class="label">Bought at:</span> ${plant.bought_at || '-'}`;

                const planted = document.createElement('div');
                planted.className = 'info';
                planted.innerHTML = `<span class="label">Planted at:</span> ${plant.planted_at || '-'}`;

                const died = document.createElement('div');
                died.className = 'info';
                died.innerHTML = `<span class="label">Died at:</span> ${plant.died_at || 'Alive 🌿'}`;

                const canvas = document.createElement('canvas');
                canvas.id = 'chart';
                canvas.height = 200;

                card.appendChild(image);
                card.appendChild(name);
                card.appendChild(nickname);
                card.appendChild(bought);
                card.appendChild(planted);
                card.appendChild(died);
                card.appendChild(canvas);

                container.appendChild(card);

                return fetch(`/api/plants/${plantId}/heights`);
            })
            .then(res => res.json())
            .then(data => {
                if (data) {
                    data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                    const labels = data.map(h =>
                        new Date(h.created_at).toLocaleDateString()
                    );

                    const values = data.map(h => h.value);

                    const ctx = document.getElementById('chart').getContext('2d');

                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Height',
                                data: values,
                                borderColor: '#2c7be5',
                                backgroundColor: 'rgba(44,123,229,0.2)',
                                tension: 0.3,
                                fill: true,
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: true
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                }
                else {
                    document.getElementById('chart').replaceWith(
                        Object.assign(document.createElement('div'), {
                            className: 'empty',
                            textContent: 'No height data yet 🌱'
                        })
                    );
                }
            })
            .catch(err => {
                document.getElementById('plant').innerHTML =
                    '<p class="empty">Failed to load plant 😢</p>';
                console.error(err);
            });
    }
</script>

</body>
</html>
